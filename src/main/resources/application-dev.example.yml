spring:
  datasource:
    url: jdbc:mysql://localhost:3306/invault_inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
    username: invault_admin
    password: CHANGE_ME
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Development only.
      # Allows Hibernate to create/update tables from JPA entities while the model is still evolving.
      # Do not use this strategy in production.
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true